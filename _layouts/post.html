<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <title>{{ page.title }} | {{ site.title }}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;1,9..144,300;1,9..144,400;1,9..144,700;1,9..144,900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --cream: #F6F0E8;
        --ink: #1C1917;
        --rust: #C25435;
        --warm-gray: #9A908A;
        --border: rgba(0,0,0,0.11);
        --hover-bg: rgba(255,255,255,0.45);
        --c1: #e81416;
        --c2: #ffa500;
        --c3: #79c314;
        --c4: #70369d;
        --c5: #487de7;

        --fd: 'Fraunces', Georgia, serif;
        --fb: 'Plus Jakarta Sans', system-ui, sans-serif;
      }

      html { scroll-behavior: smooth; font-size: 16px; }

      body {
        margin: 0;
        background: #ffffff;
        color: var(--ink);
        font-family: var(--fb);
        font-weight: 400;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      a { color: inherit; text-decoration: none; }

      /* ── FLOATING ORBS ─────────────────────────────── */
      .orbs {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(90px);
        will-change: transform;
      }
      .orb-1 {
        width: 680px; height: 680px;
        background: radial-gradient(circle, rgba(232,20,22,0.28) 0%, transparent 70%);
        top: -180px; left: -180px;
        animation: float1 28s ease-in-out infinite;
      }
      .orb-2 {
        width: 560px; height: 560px;
        background: radial-gradient(circle, rgba(255,165,0,0.25) 0%, transparent 70%);
        top: 5%; right: -120px;
        animation: float2 34s ease-in-out infinite;
        animation-delay: -8s;
      }
      .orb-3 {
        width: 620px; height: 620px;
        background: radial-gradient(circle, rgba(121,195,20,0.22) 0%, transparent 70%);
        top: 45%; right: -160px;
        animation: float3 26s ease-in-out infinite;
        animation-delay: -14s;
      }
      .orb-4 {
        width: 700px; height: 700px;
        background: radial-gradient(circle, rgba(72,125,231,0.22) 0%, transparent 70%);
        bottom: -200px; right: 10%;
        animation: float4 32s ease-in-out infinite;
        animation-delay: -5s;
      }
      .orb-5 {
        width: 600px; height: 600px;
        background: radial-gradient(circle, rgba(112,54,157,0.2) 0%, transparent 70%);
        bottom: -100px; left: -150px;
        animation: float5 29s ease-in-out infinite;
        animation-delay: -20s;
      }
      .orb-6 {
        width: 500px; height: 500px;
        background: radial-gradient(circle, rgba(230,0,208,0.15) 0%, transparent 70%);
        top: 35%; left: 30%;
        animation: float6 38s ease-in-out infinite;
        animation-delay: -11s;
      }

      @keyframes float1 { 0%, 100% { transform: translate(0, 0); } 40% { transform: translate(160px, 220px); } 70% { transform: translate(60px, 380px); } }
      @keyframes float2 { 0%, 100% { transform: translate(0, 0); } 35% { transform: translate(-180px, 160px); } 65% { transform: translate(-80px, 320px); } }
      @keyframes float3 { 0%, 100% { transform: translate(0, 0); } 30% { transform: translate(-220px, -180px); } 60% { transform: translate(-100px, -300px); } }
      @keyframes float4 { 0%, 100% { transform: translate(0, 0); } 45% { transform: translate(-200px, -160px); } 75% { transform: translate(-350px, -80px); } }
      @keyframes float5 { 0%, 100% { transform: translate(0, 0); } 38% { transform: translate(200px, -140px); } 68% { transform: translate(320px, -260px); } }
      @keyframes float6 { 0%, 100% { transform: translate(0, 0); } 42% { transform: translate(120px, -180px); } 72% { transform: translate(-100px, 140px); } }

      /* ── GRAIN OVERLAY ───────────────────────────── */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        opacity: 0.038;
        pointer-events: none;
        z-index: 9999;
      }

      /* ── GLASS UTILITY ────────────────────────────── */
      .glass {
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(22px);
        -webkit-backdrop-filter: blur(22px);
        border: 1px solid rgba(255, 255, 255, 0.88);
        box-shadow: 0 4px 32px rgba(0, 0, 0, 0.05);
      }

      .section-wrap {
        max-width: 1160px;
        margin: 0 auto;
        padding: clamp(2.5rem, 4vw, 3.5rem) clamp(1.5rem, 5vw, 3.5rem);
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(22px);
        -webkit-backdrop-filter: blur(22px);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.88);
        box-shadow: 0 4px 32px rgba(0, 0, 0, 0.05);
        position: relative;
        z-index: 1;
        margin-top: 110px; /* offset fixed blog navbar */
      }

      nav {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 28px clamp(1.5rem, 5vw, 3.5rem);
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 1px 0 rgba(0,0,0,0.07);
        opacity: 1;
      }
      .nav-name {
        font-family: var(--fb);
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink);
      }
      .nav-links {
        display: flex;
        gap: 40px;
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .nav-links a {
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--warm-gray);
      }
      .nav-links a:hover { color: var(--ink); }

      /* ── POST TYPOGRAPHY ───────────────────────── */
      .post-shell {
        margin: 0 auto;
        max-width: 860px;
      }
      .post {
        padding: 28px 28px 40px;
        border-radius: 20px;
        position: relative;
        overflow: hidden;
      }
      .post::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--c1), var(--c2), var(--c3), var(--c5), var(--c4));
        opacity: 0.85;
      }
      .post h1 {
        margin: 0 0 10px;
        font-size: clamp(1.8rem, 2.8vw, 2.35rem);
        line-height: 1.08;
        font-family: var(--fd);
        font-style: italic;
        font-weight: 900;
      }
      .post .meta {
        color: var(--warm-gray);
        margin-bottom: 26px;
        font-size: 0.95rem;
      }
      .post {
        line-height: 1.75;
      }
      .post p {
        margin: 0 0 1.5em;
      }
      .post p:last-child {
        margin-bottom: 0;
      }
      .post ul,
      .post ol {
        margin: 0 0 1.5em 1.2em;
      }
      .post li {
        margin-bottom: 0.55em;
      }
      .post li:last-child {
        margin-bottom: 0;
      }
      .post img {
        max-width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
      }
      .post h2 {
        margin: 28px 0 10px;
        font-size: 1.35rem;
        color: var(--c5);
        position: relative;
        padding-left: 12px;
      }
      .post h2::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0.2em;
        bottom: 0.2em;
        width: 3px;
        border-radius: 2px;
        background: linear-gradient(180deg, var(--c5), var(--c4));
      }
      .post h3 {
        margin: 24px 0 10px;
        color: var(--c4);
      }
      .post a {
        color: #3d5a9e;
        text-decoration: underline;
        text-decoration-color: rgba(61,90,158,0.35);
        text-underline-offset: 2px;
      }
      .post a:hover {
        color: var(--ink);
        text-decoration-color: rgba(28,25,23,0.45);
      }
      .post blockquote {
        margin: 1.6em 0;
        padding: 0.9em 1em 0.9em 1.05em;
        border-left: 3px solid var(--c2);
        background: rgba(255,165,0,0.08);
        border-radius: 0 10px 10px 0;
      }
      .post blockquote p:last-child {
        margin-bottom: 0;
      }
      .post ul li::marker,
      .post ol li::marker {
        color: var(--c5);
      }
      .post hr {
        border: 0;
        height: 0;
        margin: 0;
        display: none;
      }

      code, pre {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }
      pre {
        overflow-x: auto;
        padding: 14px;
        background: rgba(0,0,0,0.04);
        border: 1px solid var(--border);
        border-radius: 12px;
      }
    </style>
  </head>

  <body id="top">
    <!-- ORBS -->
    <div class="orbs" aria-hidden="true">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
      <div class="orb orb-4"></div>
      <div class="orb orb-5"></div>
      <div class="orb orb-6"></div>
    </div>

    <nav id="nav">
      <a class="nav-name" href="{{ site.baseurl }}/">{{ site.title }}</a>
      <ul class="nav-links">
        <li><a href="{{ site.baseurl }}/#about">About</a></li>
        <li><a href="{{ site.baseurl }}/#work">Work</a></li>
        <li><a href="{{ site.baseurl }}/blog/">Writing</a></li>
        <li><a href="{{ site.baseurl }}/#contact">Contact</a></li>
      </ul>
    </nav>

    <main class="section-wrap">
      <div class="post-shell">
        <article class="post glass">
          <h1>{{ page.title }}</h1>
          <div class="meta">
            {{ page.date | date: "%B %d, %Y" }}
            {% if page.reading_time %} · {{ page.reading_time }}{% endif %}
          </div>

          {{ content }}
        </article>

        <footer style="margin-top: 28px; color: var(--warm-gray); font-size: 0.95rem; border-top: 1px solid var(--border); padding-top: 18px;">
          © {{ site.time | date: "%Y" }} {{ site.title }}
        </footer>
      </div>
    </main>
  </body>
</html>
